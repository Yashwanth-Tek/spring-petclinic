apiVersion: apps/v1
kind: Deployment
metadata:
  name: petclinic
  namespace: test-qa
spec:
  replicas: 5
  selector:
    matchLabels:
      app: petclinic
  template:
    metadata:
      labels:
        app: petclinic
    spec:
      containers:
        - name: petclinic
          image: yashwanth536/petclinic:1
          ports:
            - containerPort: 80
          env:
            - name: SERVER_PORT
              value: "80"
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
