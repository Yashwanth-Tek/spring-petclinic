apiVersion: apps/v1
kind: Deployment
metadata:
  name: petclinic-blue
  namespace: test-qa
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spring-petclinic
      version: blue
  template:
    metadata:
      labels:
        app: spring-petclinic
        version: blue
    spec:
      initContainers:
      - name: wait-for-app-init
        image: busybox
        command: ['sh', '-c', 'echo "Giving app time to initialize..."; sleep 10']
      containers:
      - name: petclinic
        image: yashwanth536/petclinic1:3
        ports:
        - containerPort: 8080

        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 90
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5

        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"

        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "h2"

---
apiVersion: v1
kind: Service
metadata:
  name: petclinic-svc
  namespace: test-qa
spec:
  selector:
    app: spring-petclinic
    version: blue
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: petclinic-svc-stage
  namespace: test-qa
spec:
  selector:
    app: spring-petclinic
    version: green
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
  type: ClusterIP
