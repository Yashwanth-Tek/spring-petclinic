global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'petclinic'
    static_configs:
      - targets: ['spring-petclinic:8080']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s
